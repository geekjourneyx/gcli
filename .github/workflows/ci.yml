name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
      - name: Download modules
        run: go mod download
      - name: Format check
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "$out"
            exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.5.0
      - name: Test
        run: CGO_ENABLED=1 go test -count=1 ./...
      - name: Build
        run: CGO_ENABLED=1 go build -o ./bin/gcli ./main.go
      - name: Release consistency
        run: make release-check
