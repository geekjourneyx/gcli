name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
      - name: Build binary
        run: |
          mkdir -p .dist
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -ldflags "-s -w -X github.com/geekjourneyx/gcli/cmd/gcli.Version=${GITHUB_REF_NAME#v}" \
            -o .dist/gcli-${{ matrix.goos }}-${{ matrix.goarch }} ./main.go
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gcli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: .dist/gcli-${{ matrix.goos }}-${{ matrix.goarch }}

  checksums-and-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: .dist
      - name: Flatten artifacts
        run: |
          find .dist -type f -name 'gcli-*' -exec mv {} .dist/ \;
      - name: Generate checksums
        run: |
          cd .dist
          sha256sum gcli-* > SHA256SUMS
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .dist/gcli-*
            .dist/SHA256SUMS
